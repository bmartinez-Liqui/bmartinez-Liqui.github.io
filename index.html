<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7c3aed">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Liquitech Repo">
    <link id="app-favicon" rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">

    <title>Liquitech / Repo | Gestión de Proyectos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Motor de Base de Datos de Alta Capacidad (IndexedDB) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            font-size: 14px;
        }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card-pro {
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 1.25rem;
        }

        .card-pro:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.08);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .calendar-grid-container {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            width: 100%;
        }

        .status-badge-pendiente { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .status-badge-en-progreso { background-color: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .status-badge-completado { background-color: #d1fae5; color: #047857; border: 1px solid #a7f3d0; }

        input[type="range"].dynamic-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            margin: 8px 0;
        }

        input[type="range"].dynamic-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #7c3aed;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 5px rgba(124, 58, 237, 0.4);
            cursor: pointer;
        }

        .gallery-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #f1f5f9;
            position: relative;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img, .gallery-item:hover video {
            transform: scale(1.1);
        }

        .profile-img-container {
            width: 110px; height: 110px;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 8px 20px -5px rgba(124, 58, 237, 0.2);
        }
        
        .big-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #e2e8f0;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .big-calendar-cell {
            background: white;
            min-height: 85px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .project-tag-bar {
            font-size: 8px;
            font-weight: 700;
            padding: 1px 3px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .exporting-pdf .no-print { display: none !important; }
        .exporting-pdf .pdf-content { padding: 25px; background: white; }
        
        .small-cal-dot { width: 4px; height: 4px; border-radius: 50%; display: inline-block; margin: 1px; }

        .p-color-0 { background: rgba(124, 58, 237, 0.15); color: #6d28d9; border-left: 2px solid #7c3aed; }
        .p-color-1 { background: rgba(16, 185, 129, 0.15); color: #065f46; border-left: 2px solid #10b981; }
        .p-color-2 { background: rgba(245, 158, 11, 0.15); color: #92400e; border-left: 2px solid #f59e0b; }
        .p-color-3 { background: rgba(239, 68, 68, 0.15); color: #991b1b; border-left: 2px solid #ef4444; }
        .p-color-4 { background: rgba(59, 130, 246, 0.15); color: #1e40af; border-left: 2px solid #3b82f6; }

        .app-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 1.25rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    iconElement.className = className;
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ elements: [iconElement] });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const StatCard = ({ title, value, icon, color }) => {
            const colors = { 
                amber: "bg-amber-50 text-amber-600", 
                blue: "bg-blue-50 text-blue-600", 
                emerald: "bg-emerald-50 text-emerald-600", 
                violet: "bg-violet-50 text-violet-600",
                slate: "bg-slate-50 text-slate-500"
            };
            return (
                <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 hover:-translate-y-1 transition-transform text-left">
                    <div className={`w-10 h-10 ${colors[color] || colors.slate} rounded-xl flex items-center justify-center shrink-0`}>
                        {icon}
                    </div>
                    <div className="text-left">
                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">{title}</p>
                        <p className="text-xl font-bold text-slate-800 leading-none">{value}</p>
                    </div>
                </div>
            );
        };

        const CONFIG_PASS = "Admin_05/14";

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [isConfigAuth, setIsConfigAuth] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [selectedProjectId, setSelectedProjectId] = useState(null);
            
            const [editId, setEditId] = useState(null);
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isCodeModalOpen, setIsCodeModalOpen] = useState(false);
            const [isGanttOpen, setIsGanttOpen] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [editingNoteId, setEditingNoteId] = useState(null);
            const [viewingMedia, setViewingMedia] = useState(null);
            const [dataLoaded, setDataLoaded] = useState(false);

            const fileInputRef = useRef(null);
            const projectDetailRef = useRef(null);
            const catChartRef = useRef(null);
            const areaChartRef = useRef(null);

            // --- VARIABLES DE DATOS ---
            const [projects, setProjects] = useState([]);
            const [groups, setGroups] = useState(["General", "Operaciones", "Contabilidad", "TI", "Comercial", "Tesorería"]);
            const [profile, setProfile] = useState({ 
                name: "Breiner Martinez", 
                title: "Analista de Datos Jr", 
                email: "bmartinez@liquitech.co", 
                bio: "Técnico en programación para analítica de datos. Especialista en transformación digital y analítica de datos en Liquitech SAS. Egresado del SENA Centro Nacional Colombo Alemán.",
                image: null,
                appIcon: null
            });
            const [categories, setCategories] = useState(["Macro", "Limpieza de datos", "Dashboard", "Ajuste de información", "Cruce de Bases", "Automatización"]);

            const [formData, setFormData] = useState({ title: '', description: '', status: 'pendiente', startDate: '', endDate: '', group: 'General', categories: [], customCategory: '' });
            const [codeData, setCodeData] = useState({ name: '', html: '' });

            // --- 1. INICIALIZACIÓN MIGRADA A INDEXED-DB ---
            useEffect(() => {
                const initData = async () => {
                    try {
                        let p = await localforage.getItem('breiner_repo_data');
                        if (!p && localStorage.getItem('breiner_repo_data')) p = JSON.parse(localStorage.getItem('breiner_repo_data'));
                        if (p) setProjects(p);

                        let prof = await localforage.getItem('breiner_profile_data');
                        if (!prof && localStorage.getItem('breiner_profile_data')) prof = JSON.parse(localStorage.getItem('breiner_profile_data'));
                        if (prof) setProfile(prof);

                        let g = await localforage.getItem('breiner_groups_data');
                        if (!g && localStorage.getItem('breiner_groups_data')) g = JSON.parse(localStorage.getItem('breiner_groups_data'));
                        if (g) setGroups(g);

                        let c = await localforage.getItem('breiner_categories_data');
                        if (!c && localStorage.getItem('breiner_categories_data')) c = JSON.parse(localStorage.getItem('breiner_categories_data'));
                        if (c) setCategories(c);

                        setDataLoaded(true);
                    } catch (e) {
                        console.error("Error cargando base de datos segura:", e);
                        setDataLoaded(true);
                    }
                };
                initData();
            }, []);

            // --- 2. GUARDADO CONTINUO EN INDEXED-DB ---
            useEffect(() => {
                if (!dataLoaded) return;

                const saveData = async () => {
                    try {
                        await localforage.setItem('breiner_repo_data', projects);
                        await localforage.setItem('breiner_profile_data', profile);
                        await localforage.setItem('breiner_groups_data', groups);
                        await localforage.setItem('breiner_categories_data', categories);
                    } catch (error) {
                        alert("⚠️ ERROR CRÍTICO: Tu disco está lleno y no se pudo guardar en la base de datos segura.");
                        console.error(error);
                    }
                };
                saveData();

                if (profile.appIcon) {
                    const icon = document.getElementById('app-favicon');
                    if (icon) icon.href = profile.appIcon;
                }

                if (view === 'dashboard') {
                    setTimeout(renderCharts, 100);
                }
            }, [projects, profile, groups, categories, view, dataLoaded]);

            const currentProject = useMemo(() => projects.find(p => p.id === selectedProjectId), [projects, selectedProjectId]);

            const stats = useMemo(() => {
                const total = projects.length;
                const completed = projects.filter(p => p.status === 'completado').length;
                const inProgress = projects.filter(p => p.status === 'en-progreso').length;
                const pending = projects.filter(p => p.status === 'pendiente').length;
                const avgProgress = total ? Math.round(projects.reduce((acc, p) => acc + (Number(p.progress) || 0), 0) / total) : 0;
                const activeAreas = new Set(projects.map(p => p.group)).size;
                return { total, completed, inProgress, pending, avgProgress, activeAreas };
            }, [projects]);

            // --- Gráficos ---
            const renderCharts = () => {
                const ctxCat = document.getElementById('categoryChart');
                if (ctxCat) {
                    if (catChartRef.current) catChartRef.current.destroy();
                    const catCounts = {};
                    projects.forEach(p => (p.categories || []).forEach(c => catCounts[c] = (catCounts[c] || 0) + 1));
                    
                    catChartRef.current = new Chart(ctxCat, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(catCounts).length ? Object.keys(catCounts) : ['Sin datos'],
                            datasets: [{
                                data: Object.values(catCounts).length ? Object.values(catCounts) : [1],
                                backgroundColor: ['#7c3aed', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#ec4899'],
                                borderWidth: 0, cutout: '70%'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10, family: 'Montserrat' } } } } }
                    });
                }

                const ctxArea = document.getElementById('areaChart');
                if (ctxArea) {
                    if (areaChartRef.current) areaChartRef.current.destroy();
                    const areaCounts = {};
                    groups.forEach(g => areaCounts[g] = projects.filter(p => p.group === g).length);

                    areaChartRef.current = new Chart(ctxArea, {
                        type: 'bar',
                        data: {
                            labels: Object.keys(areaCounts),
                            datasets: [{
                                label: 'Proyectos',
                                data: Object.values(areaCounts),
                                backgroundColor: '#7c3aed',
                                borderRadius: 4,
                                barThickness: 30
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            };

            // --- Handlers ---
            const handleSaveProject = (e) => {
                e.preventDefault();
                let finalCats = [...(formData.categories || [])];
                
                if (editId) {
                    setProjects(prev => prev.map(p => {
                        if (p.id === editId) {
                            let newProg = p.progress || 0;
                            if (formData.status === 'pendiente') newProg = Math.min(newProg, 30);
                            else if (formData.status === 'en-progreso') newProg = Math.max(31, Math.min(newProg, 90));
                            else if (formData.status === 'completado') newProg = 100;

                            return { ...p, ...formData, categories: finalCats, progress: newProg };
                        }
                        return p;
                    }));
                } else {
                    const newProj = {
                        id: Date.now(), 
                        ...formData, 
                        categories: finalCats,
                        progress: formData.status === 'completado' ? 100 : (formData.status === 'en-progreso' ? 31 : 0),
                        files: [], notes: [], codes: []
                    };
                    setProjects([newProj, ...projects]);
                }
                setIsModalOpen(false);
                setEditId(null);
            };

            const updateProgress = (id, val) => {
                setProjects(prev => prev.map(p => {
                    if (p.id === id) {
                        let finalVal = parseInt(val);
                        if (p.status === 'pendiente') finalVal = Math.min(finalVal, 30);
                        else if (p.status === 'en-progreso') finalVal = Math.max(31, Math.min(finalVal, 90));
                        else if (p.status === 'completado') finalVal = 100;
                        return { ...p, progress: finalVal };
                    }
                    return p;
                }));
            };

            const exportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projects));
                const dl = document.createElement('a');
                dl.setAttribute("href", dataStr);
                dl.setAttribute("download", `Backup_Repo.json`);
                dl.click();
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (Array.isArray(data)) {
                            setProjects(data);
                            alert("¡Información importada con éxito!");
                        }
                    } catch (err) { alert("Error al procesar archivo."); }
                };
                reader.readAsText(file);
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                const MAX_SIZE = 25 * 1024 * 1024; // 25MB Límite ampliado
                
                files.forEach(file => {
                    if (file.size > MAX_SIZE) {
                        alert(`¡Atención! El archivo "${file.name}" supera el límite de 25MB para protección de memoria.`);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const newFile = {
                            id: Date.now() + Math.random(),
                            name: file.name,
                            type: file.type || 'unknown',
                            data: reader.result 
                        };
                        setProjects(prev => prev.map(p => p.id === selectedProjectId ? { ...p, files: [...(p.files || []), newFile] } : p));
                    };
                    reader.readAsDataURL(file);
                });
                
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const deleteFile = (fileId) => {
                if(!confirm('¿Eliminar este archivo?')) return;
                setProjects(prev => prev.map(p => p.id === selectedProjectId ? { ...p, files: (p.files || []).filter(f => f.id !== fileId) } : p));
            };

            const addNote = (projectId, text) => {
                if(!text.trim()) return;
                const note = { id: Date.now(), text, date: new Date().toLocaleString() };
                setProjects(prev => prev.map(p => p.id === projectId ? { ...p, notes: [note, ...(p.notes || [])] } : p));
            };

            const handleAddCode = (e) => {
                e.preventDefault();
                const newCode = { id: Date.now(), name: codeData.name, html: codeData.html, date: new Date().toLocaleDateString() };
                setProjects(prev => prev.map(p => p.id === selectedProjectId ? { ...p, codes: [...(p.codes || []), newCode] } : p));
                setIsCodeModalOpen(false);
                setCodeData({ name: '', html: '' });
            };

            const runTool = (htmlContent) => {
                try {
                    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const win = window.open(url, '_blank');
                    if (!win) alert("Tu navegador bloqueó la ventana. Por favor, permite las ventanas emergentes (pop-ups).");
                } catch(e) {
                    alert("Error al ejecutar el código HTML.");
                }
            };

            const checkConfigAccess = (e) => {
                e.preventDefault();
                if(passInput === CONFIG_PASS) {
                    setIsConfigAuth(true);
                    setPassInput('');
                } else {
                    alert("Contraseña Incorrecta");
                }
            };

            const handleImageUpload = (e, field) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => setProfile(prev => ({ ...prev, [field]: reader.result }));
                reader.readAsDataURL(file);
            };

            const exportToPDF = (project) => {
                setIsExporting(true);
                setTimeout(() => {
                    const element = projectDetailRef.current;
                    html2pdf().from(element).set({ margin: 10, filename: `Repo_${project.title}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save().then(() => setIsExporting(false));
                }, 100);
            };

            // --- Loading State ---
            if (!dataLoaded) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 flex-col gap-4 fade-in">
                        <LucideIcon name="database" size={48} className="text-violet-600 animate-bounce" />
                        <h2 className="text-xl font-bold text-slate-800 tracking-widest uppercase">Iniciando Base de Datos Segura</h2>
                    </div>
                );
            }

            // --- Sub-renderers ---
            const renderCalendarWidget = () => (
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm h-full flex flex-col text-left">
                    <div className="flex justify-between items-center mb-3">
                        <h3 className="text-xs font-bold text-slate-800">Calendario</h3>
                        <button onClick={() => setIsGanttOpen(true)} className="hover:scale-110 transition-transform">
                            <LucideIcon name="maximize-2" size={14} className="text-violet-600" />
                        </button>
                    </div>
                    <div className="calendar-grid-container text-center text-[9px] text-slate-400 font-bold mb-1">
                        {['D','L','M','M','J','V','S'].map((d, i) => <div key={i}>{d}</div>)}
                    </div>
                    <div className="calendar-grid-container flex-1">
                        {Array.from({length: 31}, (_, i) => (
                            <div key={i} className="h-7 flex flex-col items-center justify-center rounded-lg text-[11px] font-medium text-slate-600 hover:bg-slate-50">
                                {i + 1}
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderBigCalendar = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const startDay = new Date(year, month, 1).getDay();
                const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
                const blanks = Array.from({ length: startDay }, (_, i) => null);

                return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden text-left">
                            <div className="p-5 border-b flex justify-between items-center bg-white">
                                <div className="flex items-center gap-4">
                                    <h2 className="text-lg font-bold text-slate-800">Calendario Mensual</h2>
                                    <div className="flex gap-2 bg-slate-100 p-1 rounded-xl">
                                        <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-1 hover:bg-white rounded-lg transition-colors"><LucideIcon name="chevron-left" /></button>
                                        <span className="font-bold min-w-[110px] text-center text-xs capitalize">{currentDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' })}</span>
                                        <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-1 hover:bg-white rounded-lg transition-colors"><LucideIcon name="chevron-right" /></button>
                                    </div>
                                </div>
                                <button onClick={() => setIsGanttOpen(false)} className="p-2 hover:bg-slate-100 rounded-full"><LucideIcon name="x" /></button>
                            </div>
                            <div className="flex-1 overflow-auto p-5 bg-slate-50">
                                <div className="grid grid-cols-7 bg-slate-900 text-white rounded-t-lg text-center py-2 text-[10px] font-bold uppercase">
                                    {['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'].map((d, i) => <div key={i}>{d}</div>)}
                                </div>
                                <div className="big-calendar-grid">
                                    {[...blanks, ...days].map((d, i) => {
                                        if (d === null) return <div key={`blank-${i}`} className="big-calendar-cell bg-slate-50"></div>;
                                        const active = projects.filter(p => {
                                            if(!p.startDate) return false;
                                            const s = new Date(p.startDate); s.setHours(0,0,0,0);
                                            const e = new Date(p.endDate || p.startDate); e.setHours(23,59,59);
                                            const cellDate = new Date(year, month, d);
                                            return cellDate >= s && cellDate <= e;
                                        });
                                        return (
                                            <div key={`day-${i}`} className="big-calendar-cell group text-left">

                                                return p;

                                                        <div className="absolute bottom-2 left-2 bg-black/60 text-white p-1.5 rounded-lg backdrop-blur-md"><LucideIcon name="video" size={12}/></div>

                                                </div>

                                            {/* Render Documentos */}

                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="py-12 border-2 border-dashed border-slate-100 rounded-3xl flex flex-col items-center justify-center text-slate-300 text-left"><LucideIcon name="camera" size={32} className="mb-2 opacity-20" /><p className="font-bold uppercase text-[9px] tracking-widest text-left">Sin archivos</p></div>

                                                </div>

                                    </div>

                        <div className="bg-white p-10 rounded-[3rem] border shadow-sm text-left text-sharp">
                            <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-3 mb-8 text-slate-800"><LucideIcon name="paperclip" className="text-violet-500"/> Etiquetas</h3>
                            <div className="flex flex-wrap gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar text-sharp">
                                {categories.map((c, i) => (
                                    <div key={i} className="px-4 py-2 bg-violet-50 text-violet-600 rounded-xl text-[10px] font-bold uppercase flex items-center gap-3 border border-violet-100 shadow-sm transition-all hover:bg-violet-100 text-left">{c}<button onClick={() => setCategories(categories.filter(x => x !== c))} className="text-violet-300 hover:text-red-500"><LucideIcon name="x" size={12}/></button></div>
                                ))}
                            </div>
                            <div className="flex gap-3 mt-8 pt-8 border-t border-slate-50 text-left"><input id="newCat" className="flex-1 bg-slate-50 border-none p-4 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-violet-100 transition-all shadow-inner text-left" placeholder="Nueva etiqueta..." /><button onClick={() => {const v=document.getElementById('newCat'); if(v.value){setCategories([...categories, v.value]); v.value=''}}} className="bg-slate-900 text-white p-4 rounded-2xl shadow-lg hover:bg-violet-600 transition-all"><LucideIcon name="plus" size={20}/></button></div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col selection:bg-violet-100 selection:text-violet-800 text-left">
                    <nav className="bg-white border-b border-slate-100 sticky top-0 z-50 px-8 h-16 flex items-center justify-between shadow-sm text-left">
                        <div className="flex items-center gap-10 text-left">
                            <div className="flex items-center gap-3 cursor-pointer text-left" onClick={() => {setView('dashboard'); setSelectedProjectId(null); setIsConfigAuth(false); setPassInput('');}}>
                                <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center text-white shadow-xl overflow-hidden shrink-0">{profile.appIcon ? <img src={profile.appIcon} className="w-full h-full object-cover"/> : <LucideIcon name="database" size={18} />}</div>
                                <span className="text-lg font-bold text-left tracking-tight">Liquitech / <span className="text-violet-600 text-left">Repo</span></span>
                            </div>
                            <div className="hidden lg:flex gap-8 text-[11px] font-bold text-slate-400 uppercase tracking-[2px] text-left">
                                <button onClick={() => {setView('dashboard'); setIsConfigAuth(false);}} className={view === 'dashboard' ? 'text-violet-600 border-b-2 border-violet-600 py-5' : 'py-5 hover:text-slate-600 transition-colors'}>Dashboard</button>
                                <button onClick={() => {setView('projects'); setIsConfigAuth(false);}} className={(view === 'projects' || view === 'project-detail') ? 'text-violet-600 border-b-2 border-violet-600 py-5' : 'py-5 hover:text-slate-600 transition-colors'}>Proyectos</button>
                                <button onClick={() => {setView('profile'); setIsConfigAuth(false);}} className={view === 'profile' ? 'text-violet-600 border-b-2 border-violet-600 py-5' : 'py-5 hover:text-slate-600 transition-colors'}>Creador</button>
                                <button onClick={() => setView('config')} className={view === 'config' ? 'text-violet-600 border-b-2 border-violet-600 py-5' : 'py-5 hover:text-slate-600 transition-colors'}>Configuración</button>
                            </div>
                        </div>
                        <button onClick={() => {setEditId(null); setFormData({title: '', description: '', status: 'pendiente', startDate: '', endDate: '', group: 'General', categories: []}); setIsModalOpen(true);}} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-[9px] font-bold uppercase tracking-widest hover:bg-violet-700 shadow-xl active:scale-95 transition-all text-left text-sharp">Nuevo Proyecto</button>
                    </nav>

                    <main className="app-container py-10 flex-1 text-left text-sharp">
                        {view === 'dashboard' && (
                            <div className="space-y-10 fade-in text-left text-sharp">
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch text-left">
                                    <div className="lg:col-span-8 bg-white p-10 rounded-[2.5rem] border shadow-sm flex flex-col justify-center text-left relative overflow-hidden group text-sharp">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-violet-50/30 rounded-bl-full"></div>
                                        <h1 className="text-4xl lg:text-5xl font-black text-slate-900 mb-5 leading-tight text-left">Sistema de <br/><span className="text-violet-600 italic">Gestión de Proyectos.</span></h1>
                                        <p className="text-slate-400 text-lg max-w-xl font-medium leading-relaxed text-left text-sharp">Herramienta centralizada diseñada para manejar de una mejor manera tus tareas, optimizar flujos de trabajo y garantizar el éxito de cada desarrollo digital en Liquitech SAS.</p>
                                    </div>
                                    <div className="lg:col-span-4 h-full text-left">{renderCalendarWidget()}</div>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-left text-sharp text-sharp">
                                    <StatCard title="Pendientes" value={stats.pending} icon={<LucideIcon name="clock"/>} color="slate" />
                                    <StatCard title="En Proceso" value={stats.inProgress} icon={<LucideIcon name="play"/>} color="amber" />
                                    <StatCard title="Completados" value={stats.completed} icon={<LucideIcon name="check-circle-2"/>} color="emerald" />
                                    <StatCard title="Total" value={stats.total} icon={<LucideIcon name="database"/>} color="violet" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 text-left">
                                    <div className="bg-white p-10 rounded-[3rem] border shadow-sm h-[400px] flex flex-col text-left">
                                        <h3 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-8 text-left">Categorías Usadas</h3>
                                        <div className="flex-1 relative text-left"><canvas id="categoryChart"></canvas></div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3rem] border shadow-sm h-[400px] flex flex-col text-left text-sharp">
                                        <h3 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-8 text-left">Proyectos por Área</h3>
                                        <div className="flex-1 relative text-left text-sharp"><canvas id="areaChart"></canvas></div>
                                    </div>
                                </div>
                                <div className="bg-white p-12 rounded-[3.5rem] border shadow-sm text-left">
                                    <div className="flex justify-between items-center mb-10 text-left">
                                        <div className="text-left text-sharp"><h3 className="text-2xl font-black text-slate-800 text-left">Progreso Total del Repositorio</h3><p className="text-[11px] text-slate-400 mt-2 uppercase font-black tracking-widest text-left">Avance ponderado de todas las soluciones desarrolladas</p></div>
                                        <span className="text-7xl font-black text-violet-600 italic leading-none text-right">{stats.avgProgress}%</span>
                                    </div>
                                    <div className="h-6 bg-slate-50 rounded-full overflow-hidden p-1 shadow-inner text-left"><div className="h-full bg-gradient-to-r from-violet-600 to-indigo-500 rounded-full transition-all duration-1000 shadow-xl text-left" style={{ width: `${stats.avgProgress}%` }}></div></div>
                                </div>
                            </div>
                        )}

                        {view === 'projects' && (
                            <div className="fade-in space-y-10 text-left text-sharp text-sharp">
                                <h2 className="text-4xl font-black text-slate-800 uppercase italic text-left">Mis <span className="text-violet-600 not-italic text-left">Soluciones</span></h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 text-left text-sharp">
                                    {projects.map(p => (
                                        <div key={p.id} onClick={() => {setSelectedProjectId(p.id); setView('project-detail')}} className="card-pro p-8 cursor-pointer group flex flex-col h-full text-left text-sharp">
                                            <div className="flex justify-between items-start mb-8 text-left text-sharp"><span className={`px-4 py-1.5 rounded-xl text-[10px] font-bold uppercase shadow-sm ${p.status === 'completado' ? 'status-badge-completado' : p.status === 'en-progreso' ? 'status-badge-en-progreso' : 'status-badge-pendiente'}`}>{p.status.replace('-', ' ')}</span><button onClick={(e) => {e.stopPropagation(); if(confirm('¿Eliminar?')) setProjects(projects.filter(x => x.id !== p.id))}} className="text-slate-200 hover:text-red-500 transition-all transform hover:scale-110 text-left text-sharp"><LucideIcon name="trash-2" size={20}/></button></div>
                                            <h3 className="text-2xl font-bold mb-3 group-hover:text-violet-600 transition-colors leading-tight text-left text-sharp">{p.title}</h3>
                                            <p className="text-slate-400 text-sm line-clamp-3 h-15 mb-8 font-medium leading-relaxed text-left text-sharp">{p.description}</p>
                                            <div className="mt-auto flex items-center justify-between pt-6 border-t border-slate-50 text-left text-sharp"><div className="text-violet-600 font-black italic text-xl text-left">{p.progress}%</div><div className="flex items-center gap-2 text-left"><LucideIcon name="paperclip" size={14} className="text-slate-300"/><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-left">{(p.files || []).length} archivos</span></div></div>
                                            <div className="h-2 bg-slate-50 rounded-full mt-4 overflow-hidden text-left text-sharp"><div className="h-full bg-violet-600 rounded-full transition-all duration-500 text-left" style={{ width: `${p.progress}%` }}></div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'project-detail' && currentProject && renderProjectDetail()}
                        {view === 'profile' && renderProfile()}
                        {view === 'config' && renderConfigPanel()}
                    </main>

                    {/* Modal Crear/Editar Proyecto */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[300] flex items-center justify-center p-4 text-left">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-xl overflow-hidden flex flex-col text-left">
                                <div className="p-8 border-b flex justify-between items-center bg-white text-left text-sharp text-left"><h3 className="text-2xl font-black uppercase text-slate-800 tracking-tighter text-left">{editId ? 'Editar' : 'Nueva'} <span className="text-violet-600 text-left">Solución</span></h3><button onClick={() => setIsModalOpen(false)} className="hover:text-red-500 transition-colors text-left"><LucideIcon name="x" size={24}/></button></div>
                                <form onSubmit={handleSaveProject} className="p-8 space-y-6 overflow-y-auto max-h-[80vh] custom-scrollbar text-left text-sharp">
                                    <div className="space-y-2 text-left text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left">Título</label><input required name="title" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-none outline-none font-bold text-lg focus:ring-4 focus:ring-violet-50 text-left text-sharp" placeholder="Ej: Automatización Conciliación" /></div>
                                    <div className="space-y-2 text-left text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left">Descripción</label><textarea required name="description" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl outline-none border-none h-32 font-medium focus:ring-4 focus:ring-violet-50 text-left text-sharp" placeholder="Detalla el impacto..." /></div>
                                    <div className="grid grid-cols-2 gap-6 text-left">
                                        <div className="space-y-2 text-left text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left">Estado Inicial</label><select name="status" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-none font-bold text-violet-600 outline-none appearance-none cursor-pointer text-left text-sharp"><option value="pendiente">Pendiente</option><option value="en-progreso">En progreso</option><option value="completado">Completado</option></select></div>
                                        <div className="space-y-2 text-left text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left text-sharp">Área</label><select name="group" value={formData.group} onChange={e => setFormData({...formData, group: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-none font-bold outline-none text-left appearance-none cursor-pointer text-sharp">{groups.map(g => <option key={g} value={g}>{g}</option>)}</select></div>
                                    </div>
                                    <div className="space-y-2 text-left text-sharp">
                                        <label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left">Etiquetas (Categorías)</label>
                                        <div className="flex flex-wrap gap-2 text-left text-sharp">
                                            {categories.map(c => (
                                                <div key={c} onClick={() => { const curr = formData.categories || []; setFormData({...formData, categories: curr.includes(c) ? curr.filter(x => x !== c) : [...curr, c]}); }} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase cursor-pointer border-2 transition-all ${formData.categories?.includes(c) ? 'bg-violet-600 text-white border-violet-600 shadow-md shadow-violet-100' : 'bg-white text-slate-400 border-slate-100'}`}>{c}</div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-left text-sharp">
                                        <div className="space-y-2 text-left text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left">Inicio</label><input type="date" name="startDate" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-700 outline-none text-left" /></div>
                                        <div className="space-y-2 text-left text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-left">Cierre</label><input type="date" name="endDate" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-700 outline-none text-left" /></div>
                                    </div>
                                    <div className="pt-8 flex justify-end gap-6 items-center text-left text-sharp text-sharp"><button type="button" onClick={() => setIsModalOpen(false)} className="font-bold text-slate-400 text-xs uppercase tracking-widest hover:text-slate-800 text-left">Cancelar</button><button type="submit" className="bg-violet-600 text-white px-12 py-5 rounded-3xl font-bold text-xs shadow-2xl hover:bg-violet-700 transition-all uppercase tracking-widest text-left">Guardar Solución</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Código HTML */}
                    {isCodeModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-3xl z-[400] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-3xl overflow-hidden fade-in flex flex-col text-left">
                                <div className="p-10 border-b-2 border-slate-50 flex justify-between items-center bg-white text-left text-sharp text-sharp text-sharp text-sharp"><div className="flex flex-col text-left text-sharp"><h3 className="text-3xl font-black text-slate-900 uppercase text-left text-sharp">Nueva <span className="text-violet-600 not-italic text-left text-sharp">Versión</span></h3><span className="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest text-left text-sharp">Motor ejecutable (HTML)</span></div><button onClick={() => setIsCodeModalOpen(false)} className="w-12 h-12 rounded-xl bg-slate-50 text-slate-400 hover:text-red-500 flex items-center justify-center border border-slate-100 transition-all text-left text-sharp text-sharp text-sharp"><LucideIcon name="x" size={24}/></button></div>
                                <form onSubmit={handleAddCode} className="p-10 space-y-10 text-left text-sharp text-sharp text-sharp">
                                    <div className="space-y-4 text-left text-sharp text-sharp text-sharp text-sharp text-sharp"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1 italic leading-none text-left text-sharp text-sharp">Nombre de la herramienta</label><input required value={codeData.name} onChange={e => setCodeData({...codeData, name: e.target.value})} type="text" className="w-full px-8 py-6 rounded-3xl bg-slate-50 border-none outline-none font-bold text-slate-800 focus:ring-8 focus:ring-violet-500/10 text-lg shadow-inner text-left text-sharp" placeholder="Ej: Calculadora de Datos" /></div>
                                    <div className="space-y-4 text-left text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp"><div className="flex justify-between items-center px-2 text-left text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp"><label className="text-[11px] font-bold text-violet-600 uppercase tracking-widest text-left text-sharp text-sharp text-sharp">Código fuente (HTML)</label><span className="text-[9px] text-slate-400 bg-slate-50 px-4 py-2 rounded-full font-bold uppercase border border-slate-100 text-sharp text-sharp text-sharp text-sharp text-left">Visor Independiente</span></div><textarea required value={codeData.html} onChange={e => setCodeData({...codeData, html: e.target.value})} className="w-full px-8 py-8 rounded-[3rem] bg-slate-900 border-none outline-none text-emerald-400 font-mono text-xs leading-loose shadow-2xl custom-scrollbar text-left text-sharp text-sharp text-sharp text-sharp" rows="10" placeholder="Pega el código HTML completo aquí..."></textarea></div>
                                    <div className="flex gap-6 justify-end pt-4 text-left text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp text-sharp"><button type="button" onClick={() => setIsCodeModalOpen(false)} className="text-[11px] font-bold text-slate-400 uppercase tracking-widest hover:text-slate-800 transition-all italic font-poppins text-left text-sharp">Cancelar</button><button type="submit" className="bg-violet-600 text-white px-12 py-5 rounded-full font-bold text-[11px] uppercase tracking-widest hover:bg-violet-700 shadow-2xl active:scale-95 transition-all text-left text-sharp">Guardar herramienta</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Visor de Medios (Imágenes y Videos) */}
                    {viewingMedia && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[500] flex items-center justify-center p-4 fade-in">
                            <button onClick={() => setViewingMedia(null)} className="absolute top-6 right-6 text-white/50 hover:text-white transition-colors">
                                <LucideIcon name="x" size={32}/>
                            </button>
                            <div className="max-w-5xl w-full flex items-center justify-center max-h-[90vh]">
                                {viewingMedia.type.startsWith('video/') ? (
                                    <video src={viewingMedia.data} controls autoPlay className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl" />
                                ) : (
                                    <img src={viewingMedia.data} className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl object-contain" />
                                )}
                            </div>
                        </div>
                    )}
                    
                    {isGanttOpen && renderBigCalendar()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
